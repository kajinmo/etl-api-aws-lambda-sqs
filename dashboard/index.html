<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Activity Dashboard</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="glass-panel">
            <div class="header-content">
                <h1>GitHub Serverless Data Lake pipeline</h1>
                <div class="status-indicator">
                    <span class="dot pulse"></span>
                    <span id="latest-update">Latest Update: Fetching...</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-grid">
            <!-- Sidebar Feed -->
            <aside class="sidebar glass-panel">
                <h2>Activity Firehose</h2>
                <div id="activity-feed" class="feed-container">
                    <!-- Events will be injected here -->
                </div>
            </aside>

            <!-- Map View -->
            <section class="map-container glass-panel">
                <div id="map"></div>
            </section>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
